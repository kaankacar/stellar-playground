<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar Playground</title>

  <!-- Monaco Editor -->
  <script>var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };</script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <!-- Stellar SDK (UMD browser build → window.StellarSdk) -->
  <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@latest/dist/stellar-sdk.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header (standalone mode only) ──────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #f0f4ff;
    }

    .logo svg { flex-shrink: 0; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #sdk-version {
      font-size: 11px;
      color: #5b6a8a;
      font-family: 'Menlo', 'Monaco', monospace;
    }

    #share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      color: #8899bb;
      border: 1px solid #2a3042;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #share-btn:hover { color: #e2e8f0; border-color: #4a5568; }
    #share-btn.copied { color: #69db7c; border-color: #69db7c; }

    /* ── Embed toolbar (embed mode only) ─────────────────── */
    #embed-toolbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    #open-link {
      font-size: 11px;
      color: #5b6a8a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    #open-link:hover { color: #a0b0cc; }

    /* ── Run button (shared) ──────────────────────────────── */
    #run-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #run-btn:hover { background: #4c6ef5; }
    #run-btn:active { background: #2f4ac0; }
    #run-btn:disabled { background: #2a3042; color: #5b6a8a; cursor: not-allowed; }

    #run-btn .spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    #run-btn.running .spinner { display: block; }
    #run-btn.running .run-icon { display: none; }
    #run-btn.running .run-label { display: inline; }
    .run-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout — standalone ─────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a3042;
    }

    .pane-label {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #5b6a8a;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    #editor-container { flex: 1; overflow: hidden; }

    #output-pane {
      width: 400px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: #0f1117;
      flex-shrink: 0;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none;
      border: 1px solid #2a3042;
      border-radius: 4px;
      color: #5b6a8a;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clear-btn:hover { color: #e2e8f0; border-color: #4a5568; }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.7;
    }

    #output:empty::before {
      content: 'Output will appear here after you click Run.';
      color: #3a4560;
      font-style: italic;
    }

    .log-line    { color: #c8d3f5; word-break: break-all; }
    .log-error   { color: #ff6b6b; }
    .log-warn    { color: #ffd43b; }
    .log-success { color: #69db7c; }
    .log-info    { color: #74c0fc; }
    .log-divider { border: none; border-top: 1px solid #2a3042; margin: 8px 0; }
    .log-duration { color: #3a4560; font-size: 11px; margin-top: 4px; }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: #2a3042; border-radius: 3px; }

    /* ── Embed mode overrides ─────────────────────────────── */
    body.embed {
      height: auto;
      min-height: 0;
      overflow: visible;
    }

    body.embed header       { display: none; }
    body.embed #embed-toolbar { display: flex; }

    body.embed main {
      flex-direction: column;
      height: auto;
      overflow: visible;
    }

    body.embed #editor-pane {
      border-right: none;
      border-bottom: 1px solid #2a3042;
      height: 280px;
      flex: none;
    }

    body.embed #editor-container { height: 100%; }

    body.embed #output-pane {
      width: 100%;
      min-width: 0;
      height: 200px;
      flex: none;
    }

    body.embed #output { height: 100%; }
  </style>
</head>
<body>

<!-- Standalone header -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="#4c6ef5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Stellar Playground
  </div>
  <div class="header-right">
    <span id="sdk-version">loading sdk…</span>
    <button id="share-btn">⎘ Share</button>
    <button id="run-btn" disabled>
      <span class="run-icon">▶ Run</span>
      <span class="spinner"></span>
      <span class="run-label">Running…</span>
    </button>
  </div>
</header>

<!-- Embed toolbar (shown instead of header in embed mode) -->
<div id="embed-toolbar">
  <button id="run-btn-embed" disabled>
    <span class="run-icon">▶ Run</span>
    <span class="spinner"></span>
    <span class="run-label">Running…</span>
  </button>
  <a id="open-link" href="#" target="_blank" rel="noopener">↗ Open in Playground</a>
</div>

<main>
  <div id="editor-pane">
    <div class="pane-label">JavaScript</div>
    <div id="editor-container"></div>
  </div>

  <div id="output-pane">
    <div class="output-header">
      <span class="pane-label" style="padding:0;border:none;background:none;">Console</span>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="output"></div>
  </div>
</main>

<script>
// ── Detect mode ───────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search)
const EMBED    = params.get('embed') === '1'
const BASE_URL = window.location.origin + window.location.pathname

if (EMBED) document.body.classList.add('embed')

// ── Default starter code ──────────────────────────────────────
const STARTER_CODE = `// Stellar Playground — powered by @stellar/stellar-sdk
// Runs on Testnet. All operations are free and reversible.

const { Keypair, Horizon } = require('@stellar/stellar-sdk')

// 1. Generate a fresh keypair
const keypair = Keypair.random()
console.log('Public Key :', keypair.publicKey())
console.log('Secret Key :', keypair.secret())

// 2. Fund it via Friendbot (testnet only)
const fundResp = await fetch(
  \`https://friendbot.stellar.org?addr=\${encodeURIComponent(keypair.publicKey())}\`
)
const fundResult = await fundResp.json()
console.log('Funded      :', fundResult.successful !== false ? '✓ yes' : '✗ failed')

// 3. Load account from Horizon
const server = new Horizon.Server('https://horizon-testnet.stellar.org')
const account = await server.loadAccount(keypair.publicKey())

// 4. Print balances
account.balances.forEach(b => {
  const asset = b.asset_type === 'native' ? 'XLM' : b.asset_code
  console.log(\`Balance     : \${b.balance} \${asset}\`)
})
`

// ── URL helpers ───────────────────────────────────────────────
function getInitialCode() {
  try {
    const encoded = params.get('code')
    if (encoded) return atob(encoded)
  } catch {}
  return STARTER_CODE
}

function makeStandaloneUrl(code) {
  return `${BASE_URL}?code=${btoa(code)}`
}

// ── Fake require() ────────────────────────────────────────────
function fakeRequire(pkg) {
  const stellar = ['stellar-sdk', '@stellar/stellar-sdk']
  if (stellar.includes(pkg)) {
    if (typeof window.StellarSdk !== 'undefined') return window.StellarSdk
    throw new Error('@stellar/stellar-sdk is still loading — try again in a moment')
  }
  throw new Error(`Cannot require '${pkg}' — only @stellar/stellar-sdk is available`)
}

// ── Wait for SDK to load, then enable run buttons ─────────────
function waitForSdk(cb) {
  if (window.StellarSdk) return cb()
  setTimeout(() => waitForSdk(cb), 150)
}

waitForSdk(() => {
  // Enable both run buttons now that SDK is ready
  document.querySelectorAll('#run-btn, #run-btn-embed').forEach(b => b.disabled = false)
  // Update badge
  const el = document.getElementById('sdk-version')
  if (el) {
    el.textContent = window.StellarSdk.version
      ? `@stellar/stellar-sdk v${window.StellarSdk.version}`
      : '@stellar/stellar-sdk loaded'
  }
})

// ── Console capture ───────────────────────────────────────────
function makeConsole(outputEl) {
  const line = (cls, ...args) => {
    const div = document.createElement('div')
    div.className = cls
    div.textContent = args.map(a => {
      if (typeof a === 'object') { try { return JSON.stringify(a, null, 2) } catch {} }
      return String(a)
    }).join(' ')
    outputEl.appendChild(div)
    outputEl.scrollTop = outputEl.scrollHeight
    sendHeight()
  }
  return {
    log:   (...a) => line('log-line',  ...a),
    error: (...a) => line('log-error', '✗', ...a),
    warn:  (...a) => line('log-warn',  '⚠', ...a),
    info:  (...a) => line('log-info',  'ℹ', ...a),
  }
}

// ── postMessage height (for parent to resize iframe) ──────────
function sendHeight() {
  if (!EMBED) return
  const h = document.documentElement.scrollHeight
  window.parent.postMessage({ type: 'stellar-playground', height: h }, '*')
}

// ── Run code ──────────────────────────────────────────────────
async function runCode(code, outputEl) {
  const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor
  const wrapped = `const require = __require__;\n${code}`
  try {
    await new AsyncFunction('__require__', 'console', wrapped)(fakeRequire, makeConsole(outputEl))
  } catch (err) {
    const div = document.createElement('div')
    div.className = 'log-error'
    div.textContent = `✗ ${err.name}: ${err.message}`
    outputEl.appendChild(div)
    sendHeight()
  }
}

// ── Wire up run button helper ─────────────────────────────────
function setupRunButton(btn, getCode, outputEl) {
  btn.addEventListener('click', async () => {
    btn.disabled = true
    btn.classList.add('running')

    if (outputEl.children.length > 0) {
      const hr = document.createElement('hr')
      hr.className = 'log-divider'
      outputEl.appendChild(hr)
    }

    const start = Date.now()
    await runCode(getCode(), outputEl)

    const dur = document.createElement('div')
    dur.className = 'log-duration'
    dur.textContent = `finished in ${Date.now() - start}ms`
    outputEl.appendChild(dur)
    outputEl.scrollTop = outputEl.scrollHeight
    sendHeight()

    btn.disabled = false
    btn.classList.remove('running')
  })
}

// ── Wire up Monaco ────────────────────────────────────────────
require(['vs/editor/editor.main'], function () {
  const outputEl = document.getElementById('output')
  const clearBtn = document.getElementById('clear-btn')

  const editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: getInitialCode(),
    language: 'javascript',
    theme: 'vs-dark',
    fontSize: 13,
    lineHeight: 21,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    padding: { top: 16 },
    fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
    wordWrap: 'on',
    tabSize: 2,
  })

  window.addEventListener('resize', () => editor.layout())

  // Standalone run button
  const runBtn = document.getElementById('run-btn')
  setupRunButton(runBtn, () => editor.getValue(), outputEl)
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
    if (!runBtn.disabled) runBtn.click()
  })

  // Embed run button
  const runBtnEmbed = document.getElementById('run-btn-embed')
  setupRunButton(runBtnEmbed, () => editor.getValue(), outputEl)

  // Share button (standalone only)
  const shareBtn = document.getElementById('share-btn')
  shareBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(makeStandaloneUrl(editor.getValue())).then(() => {
      shareBtn.textContent = '✓ Copied!'
      shareBtn.classList.add('copied')
      setTimeout(() => {
        shareBtn.textContent = '⎘ Share'
        shareBtn.classList.remove('copied')
      }, 2000)
    })
  })

  // Open link (embed only) — opens standalone playground in new tab with current code
  const openLink = document.getElementById('open-link')
  openLink.href = makeStandaloneUrl(editor.getValue())
  editor.onDidChangeModelContent(() => {
    openLink.href = makeStandaloneUrl(editor.getValue())
  })

  // Clear button
  clearBtn.addEventListener('click', () => {
    outputEl.innerHTML = ''
    sendHeight()
  })

  // Listen for secret key injection from parent StellarQuest page
  // When user clicks Register, parent sends { type: 'stellar-quest-inject', secret: 'S...' }
  // We replace SECRET_KEY_HERE in the editor with the real key automatically
  window.addEventListener('message', (event) => {
    if (!event.data || event.data.type !== 'stellar-quest-inject') return
    const secret = event.data.secret
    if (!secret || !editor) return
    const current = editor.getValue()
    const updated = current.replace(/'SECRET_KEY_HERE'/g, `'${secret}'`)
    if (updated !== current) editor.setValue(updated)
  })

  // Initial height signal to parent
  sendHeight()
})
</script>

</body>
</html>
