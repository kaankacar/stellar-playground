<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar Playground</title>

  <!-- Monaco Editor -->
  <script>var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };</script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <!-- Stellar SDK (UMD browser build → window.StellarSdk) -->
  <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@latest/dist/stellar-sdk.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #f0f4ff;
    }

    .logo svg { flex-shrink: 0; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #sdk-version {
      font-size: 11px;
      color: #5b6a8a;
      font-family: 'Menlo', 'Monaco', monospace;
    }

    #share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      color: #8899bb;
      border: 1px solid #2a3042;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #share-btn:hover { color: #e2e8f0; border-color: #4a5568; }
    #share-btn.copied { color: #69db7c; border-color: #69db7c; }

    #run-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #run-btn:hover { background: #4c6ef5; }
    #run-btn:active { background: #2f4ac0; }
    #run-btn:disabled { background: #2a3042; color: #5b6a8a; cursor: not-allowed; }

    #run-btn .spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    #run-btn.running .spinner { display: block; }
    #run-btn.running .run-icon { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor pane ─────────────────────────────────────── */
    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a3042;
    }

    .pane-label {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #5b6a8a;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
    }

    /* ── Output pane ─────────────────────────────────────── */
    #output-pane {
      width: 400px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: #0f1117;
      flex-shrink: 0;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #161b27;
      border-bottom: 1px solid #2a3042;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none;
      border: 1px solid #2a3042;
      border-radius: 4px;
      color: #5b6a8a;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #clear-btn:hover { color: #e2e8f0; border-color: #4a5568; }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.7;
    }

    #output:empty::before {
      content: 'Output will appear here after you click Run.';
      color: #3a4560;
      font-style: italic;
    }

    .log-line { color: #c8d3f5; word-break: break-all; }
    .log-error { color: #ff6b6b; }
    .log-warn { color: #ffd43b; }
    .log-success { color: #69db7c; }
    .log-info { color: #74c0fc; }
    .log-divider {
      border: none;
      border-top: 1px solid #2a3042;
      margin: 8px 0;
    }
    .log-duration {
      color: #3a4560;
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Scrollbar ───────────────────────────────────────── */
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: #2a3042; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="#4c6ef5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Stellar Playground
  </div>
  <div class="header-right">
    <span id="sdk-version">loading sdk…</span>
    <button id="share-btn">⎘ Share</button>
    <button id="run-btn">
      <span class="run-icon">▶ Run</span>
      <span class="spinner"></span>
      <span class="run-label">Running…</span>
    </button>
  </div>
</header>

<main>
  <div id="editor-pane">
    <div class="pane-label">JavaScript</div>
    <div id="editor-container"></div>
  </div>

  <div id="output-pane">
    <div class="output-header">
      <span class="pane-label" style="padding:0; border:none; background:none;">Console</span>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="output"></div>
  </div>
</main>

<script>
// ── Default starter code ────────────────────────────────────
const STARTER_CODE = `// Stellar Playground — powered by @stellar/stellar-sdk
// Runs on Testnet. All operations are free and reversible.

const { Keypair, Horizon } = require('@stellar/stellar-sdk')

// 1. Generate a fresh keypair
const keypair = Keypair.random()
console.log('Public Key :', keypair.publicKey())
console.log('Secret Key :', keypair.secret())

// 2. Fund it via Friendbot (testnet only)
const fundResp = await fetch(
  \`https://friendbot.stellar.org?addr=\${encodeURIComponent(keypair.publicKey())}\`
)
const fundResult = await fundResp.json()
console.log('Funded      :', fundResult.successful !== false ? '✓ yes' : '✗ failed')

// 3. Load account from Horizon
const server = new Horizon.Server('https://horizon-testnet.stellar.org')
const account = await server.loadAccount(keypair.publicKey())

// 4. Print balances
account.balances.forEach(b => {
  const asset = b.asset_type === 'native' ? 'XLM' : b.asset_code
  console.log(\`Balance     : \${b.balance} \${asset}\`)
})
`;

// ── Fake require() — returns stellar-sdk for any import of it ─
function fakeRequire(pkg) {
  const stellar = ['stellar-sdk', '@stellar/stellar-sdk']
  if (stellar.includes(pkg)) {
    if (typeof window.StellarSdk !== 'undefined') return window.StellarSdk
    throw new Error('@stellar/stellar-sdk is still loading — try again in a moment')
  }
  throw new Error(`Cannot require '${pkg}' — only @stellar/stellar-sdk is available`)
}

// ── Show SDK version once loaded ──────────────────────────────
function updateSdkBadge() {
  const el = document.getElementById('sdk-version')
  if (window.StellarSdk && window.StellarSdk.version) {
    el.textContent = `@stellar/stellar-sdk v${window.StellarSdk.version}`
  } else if (window.StellarSdk) {
    el.textContent = '@stellar/stellar-sdk loaded'
  } else {
    el.textContent = 'SDK unavailable'
  }
}
window.addEventListener('load', updateSdkBadge)

// ── Console capture ───────────────────────────────────────────
function makeConsole(outputEl) {
  const line = (cls, ...args) => {
    const div = document.createElement('div')
    div.className = cls
    div.textContent = args.map(a => {
      if (typeof a === 'object') {
        try { return JSON.stringify(a, null, 2) } catch { return String(a) }
      }
      return String(a)
    }).join(' ')
    outputEl.appendChild(div)
    outputEl.scrollTop = outputEl.scrollHeight
  }
  return {
    log:   (...a) => line('log-line', ...a),
    error: (...a) => line('log-error', '✗', ...a),
    warn:  (...a) => line('log-warn',  '⚠', ...a),
    info:  (...a) => line('log-info',  'ℹ', ...a),
  }
}

// ── Run code ──────────────────────────────────────────────────
async function runCode(code, outputEl) {
  const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor
  const customConsole = makeConsole(outputEl)

  // Wrap so top-level await works and require is available
  const wrapped = `
    const require = __require__;
    ${code}
  `

  try {
    const fn = new AsyncFunction('__require__', 'console', wrapped)
    await fn(fakeRequire, customConsole)
  } catch (err) {
    const div = document.createElement('div')
    div.className = 'log-error'
    div.textContent = `✗ ${err.name}: ${err.message}`
    outputEl.appendChild(div)
  }
}

// ── URL param: ?code=<base64> ─────────────────────────────────
function getInitialCode() {
  try {
    const params = new URLSearchParams(window.location.search)
    const encoded = params.get('code')
    if (encoded) return atob(encoded)
  } catch {}
  return STARTER_CODE
}

// Helper to generate a shareable URL for any code string
function makeShareUrl(code) {
  const base = window.location.origin + window.location.pathname
  return `${base}?code=${btoa(code)}`
}

// ── Wire up Monaco ────────────────────────────────────────────
require(['vs/editor/editor.main'], function () {
  const outputEl = document.getElementById('output')
  const runBtn   = document.getElementById('run-btn')
  const clearBtn = document.getElementById('clear-btn')

  // Create editor
  const editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: getInitialCode(),
    language: 'javascript',
    theme: 'vs-dark',
    fontSize: 13,
    lineHeight: 21,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    padding: { top: 16 },
    fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
    wordWrap: 'on',
    tabSize: 2,
  })

  // Resize editor when window changes
  window.addEventListener('resize', () => editor.layout())

  // Run button
  runBtn.addEventListener('click', async () => {
    runBtn.disabled = true
    runBtn.classList.add('running')

    // Divider if there's prior output
    if (outputEl.children.length > 0) {
      const hr = document.createElement('hr')
      hr.className = 'log-divider'
      outputEl.appendChild(hr)
    }

    const start = Date.now()
    await runCode(editor.getValue(), outputEl)
    const elapsed = Date.now() - start

    const dur = document.createElement('div')
    dur.className = 'log-duration'
    dur.textContent = `finished in ${elapsed}ms`
    outputEl.appendChild(dur)
    outputEl.scrollTop = outputEl.scrollHeight

    runBtn.disabled = false
    runBtn.classList.remove('running')
  })

  // Ctrl/Cmd + Enter to run
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
    if (!runBtn.disabled) runBtn.click()
  })

  // Clear button
  clearBtn.addEventListener('click', () => { outputEl.innerHTML = '' })

  // Share button — copies a URL with the current code embedded as base64
  const shareBtn = document.getElementById('share-btn')
  shareBtn.addEventListener('click', () => {
    const url = makeShareUrl(editor.getValue())
    navigator.clipboard.writeText(url).then(() => {
      shareBtn.textContent = '✓ Copied!'
      shareBtn.classList.add('copied')
      setTimeout(() => {
        shareBtn.textContent = '⎘ Share'
        shareBtn.classList.remove('copied')
      }, 2000)
    })
  })
})
</script>

</body>
</html>
